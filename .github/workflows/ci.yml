name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

  deployment-readiness:
    name: Deployment readiness
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Verify deployment documentation exists
        run: test -f docs/cloudflare-deployment.md
      - name: Explain deployment status
        run: |
          echo "CI passed."
          echo "Deployment is intentionally not automatic yet."
          echo "See docs/cloudflare-deployment.md for required Cloudflare permissions, secrets, and runtime choices."
          echo "The current Bun/Elysia server should be deployed to a Bun-compatible runtime or adapted before Cloudflare Workers deployment."
